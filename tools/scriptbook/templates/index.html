<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ScriptBook</title>
  <link rel="stylesheet" href="assets/app.css" />
</head>
<body>
  <header class="topbar">
    <div class="container">
      <h1>ScriptBook</h1>
      <div class="sub">静态脚本/配置文档索引</div>
    </div>
  </header>

  <main class="container">
    <section class="panel">
      <div class="row">
        <input id="q" class="input" placeholder="搜索（标题/路径/描述/标签）" />
        <select id="dir" class="select"></select>
        <select id="type" class="select"></select>
        <select id="sort" class="select">
          <option value="name">按名称</option>
          <option value="mtime">按最近修改</option>
          <option value="size">按大小</option>
        </select>
        <button id="reset" class="btn">重置</button>
      </div>
      <div class="row" style="margin-top:10px">
        <div class="muted" id="stats">加载中…</div>
      </div>
      <div class="row" style="margin-top:10px">
        <select id="state" class="select">
          <option value="">全部状态</option>
          <option value="visible">仅可展示</option>
          <option value="blocked">仅已隐藏</option>
        </select>
        <select id="entry" class="select">
          <option value="">全部入口</option>
          <option value="readme">README 提到</option>
          <option value="npm">npm scripts</option>
        </select>
      </div>
      <div class="row" style="margin-top:10px">
        <div class="tagpanel">
          <div class="tagpanel-title muted">标签（AND，多选）</div>
          <div id="tags" class="tagbox"></div>
        </div>
      </div>
      <div id="list" class="list"></div>
      <div class="row" style="margin-top:10px">
        <button id="more" class="btn">加载更多</button>
      </div>
    </section>
  </main>

  <script src="assets/app.js"></script>
</body>
</html>
